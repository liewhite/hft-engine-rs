# 资金费率套利系统配置

[exchanges.binance]
api_key = "your_binance_api_key"
secret = "your_binance_secret"

[exchanges.okx]
api_key = "your_okx_api_key"
secret = "your_okx_secret"
passphrase = "your_okx_passphrase"

[strategy]
symbols = ["BTC_USDT", "ETH_USDT"]

[strategy.funding_arb]
# 开仓阈值 (费率差大于此值时开仓)
min_spread = "0.0005"
# 最大费率差 (超过此值不开仓，防止极端行情)
max_spread = "0.002"
# 平仓阈值 (费率差小于此值时平仓)
close_spread = "0.0002"
# 基础下单数量
base_quantity = "0.01"
# 最大持仓数量
max_quantity = "1.0"

[engine]
queue_capacity = 256
